name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: dnd-store  # Change this to your Azure App Service name

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server

  test-client:
    name: Client Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm test
        working-directory: client
      - run: npm run build
        working-directory: client

  deploy:
    name: Deploy to Azure
    needs: [test-server, test-client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install server dependencies (production only)
        run: npm ci --omit=dev
        working-directory: server

      - name: Install client dependencies & build
        run: npm ci && npm run build
        working-directory: client

      - name: Assemble deployment package
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/client
          cp -r server/src       deploy/server/src
          cp -r server/node_modules deploy/server/node_modules
          cp    server/package.json deploy/server/package.json
          cp -r client/dist      deploy/client/dist
          cp    package.json     deploy/package.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/
