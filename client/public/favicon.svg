<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1208"/>
  <g fill="none" stroke="#c9a84c" stroke-linecap="round">
    <!-- Sword 1: / shape — blade tip at top-right, pommel at bottom-left -->
    <line x1="5" y1="27" x2="27" y2="5" stroke-width="2.5"/>
    <!-- Guard of sword 1: perpendicular through (12,20) -->
    <line x1="9" y1="17" x2="15" y2="23" stroke-width="2.5"/>
    <!-- Sword 2: \ shape — blade tip at top-left, pommel at bottom-right -->
    <line x1="27" y1="27" x2="5" y2="5" stroke-width="2.5"/>
    <!-- Guard of sword 2: perpendicular through (20,20) -->
    <line x1="17" y1="23" x2="23" y2="17" stroke-width="2.5"/>
  </g>
</svg>
